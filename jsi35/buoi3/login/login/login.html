<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Đăng nhập </title>
    <link rel="stylesheet" href="login.css" >
</head>
<body>
    <div id="form-section">
        <form id="register-form">
            <h1 class="form-title"> Đăng nhập </h1>
            <div class="input-container">
                <input type="text" placeholder="Email/Số điện thoại" required>
            </div>
            <div class="input-container">
                <input type="password" placeholder="Mật khẩu" required>
            </div>
            <a href="#" id="forgot-password">Forgot password?</a>
            <div class="terms-container">
                <label> 
                    <input type="checkbox"> 
                    Lưu phiên đăng nhập của tôi.  
                </label>
            </div>
            <div>
            <button type="submit" class="submit-button"> Đăng nhập </button>
            <div class="new-account">
                <span> Thành viên mới? </span> 
                <button class="sign-up-button"> Đăng ký </button>
            </div>
        </form>
    </div> 

    <script src="./buoi3.js"></script>
</body>
</html>
