<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập về nhà</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          display: grid;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: #f4f4f4;
          gap: 20px;
        }
        .id-card {
          position: relative;
          width: 300px;
          height: 180px;
          border: 2px solid #333;
          border-radius: 10px;
          padding: 20px;
          background-color: white;
          box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .id-card img {
          position: absolute;
          width: 96px;
          height: 64px;
          right: 50px;
          top: 20px;
          background-color: #ccc;
        }
        .id-card .details {
          font-size: 16px;
        }
        .id-card .details div {
          margin: 5px 0;
        }
        .id-card .label {
          font-weight: bold;
          color: #333;
        }
        /* Flexbox for the specific lines */
        .details .row {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
        .details .row .label {
          margin-right: 10px; /* Add some space between label and value */
        }
      </style>
</head>
<body>
    <script src="practise.js"></script>
</body>
</html>
